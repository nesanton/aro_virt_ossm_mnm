# ------------------------------------------------------------
# ArgoCD Application — step2-ossm-operators
#
# ALWAYS ON. Installs OSSM 3.x operators and control plane:
#   - Sail Operator (OSSM 3.x / Istio)
#   - Kiali Operator 2.x
#   - Tempo Operator
#   - IstioCNI (node-level CNI — ARO SCC compat, see D-003)
#   - Istio control plane (sidecar mode, profile: default)
#   - TempoMonolithic (in-memory tracing backend)
#   - Kiali (topology + distributed tracing UI)
#
# sync-wave ordering in operators/ handles the operator-first dependency:
#   wave 0 = namespaces + subscriptions
#   wave 1 = CRD-dependent CRs (with SkipDryRunOnMissingResource)
#
# Apply once after bootstrap:
#   oc apply -f deploy/argocd/application-ossm-operators.yaml
# ------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: step2-ossm-operators
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: aro-ossm-demo
    demo-step: step2-ossm
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: eshoplite-demo

  source:
    repoURL: "https://github.com/nesanton/aro_virt_ossm_mnm.git"
    targetRevision: main
    path: deploy/step2-ossm/operators

  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system

  # Ignore operator-injected defaults that are not in our Git manifests.
  # These fields are added by the respective operators at runtime and do not
  # represent drift — the operators are managing them correctly.
  ignoreDifferences:
    # Sail Operator sets updateStrategy.type=InPlace as a default on Istio CRs
    - group: sailoperator.io
      kind: Istio
      jsonPointers:
        - /spec/updateStrategy
    # Sail Operator adds its own finalizer to IstioCNI for cleanup ordering
    - group: sailoperator.io
      kind: IstioCNI
      jsonPointers:
        - /metadata/finalizers
    # Kiali Operator injects spec.version with the installed channel default
    - group: kiali.io
      kind: Kiali
      jsonPointers:
        - /spec/version
    # Tempo Operator injects spec.timeout defaulting to 0s
    - group: tempo.grafana.com
      kind: TempoMonolithic
      jsonPointers:
        - /spec/timeout

  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
