# ------------------------------------------------------------
# Kustomize entry point for deploy/step1-vm/
#
# ArgoCD uses this file to discover what to apply. All resources
# in this directory are listed here so ArgoCD pruning works
# correctly (unknown resources are removed on sync).
#
# To apply manually without ArgoCD:
#   kubectl apply -k deploy/step1-vm/
# ------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # namespace.yaml is intentionally NOT listed here.
  # ArgoCD creates the namespace via CreateNamespace=true in the Application
  # syncOptions. Keeping it out means step2-ossm-config (which adds the
  # istio-injection label) is the sole SSA owner of the namespace object — no label fight.
  # cloudinit-secret.yaml is intentionally NOT listed here.
  # ArgoCD must not manage it — bootstrap.sh creates it with the real SSH
  # public key injected. If ArgoCD managed it, self-heal would revert the
  # key back to the placeholder on every resync before cloud-init runs.
  - vm.yaml                 # VirtualMachine: eShopLite monolith on RHEL 8
  - service.yaml            # Service: ClusterIP :80 -> VM :5000
  - route.yaml              # Route: edge TLS, auto-hostname
