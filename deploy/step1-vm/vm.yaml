# ------------------------------------------------------------
# VirtualMachine — eShopLite monolith on RHEL 8
#
# Image: OpenShift Virt golden image (DataSource rhel8)
#   - Pre-pulled by OCP Virt into openshift-virtualization-os-images
#   - No external registry pull required — cloned locally via CDI
#   - Proper RHEL 8 for the "legacy enterprise VM" narrative
#   - Uses a DataVolumeTemplate; PVC is created per-VM at boot time
#   - On cluster recreate: OCP Virt re-downloads the golden image
#     automatically; VM PVC is cloned from it on first apply
#
#
# App: eShopLite.StoreCore — the .NET 9 monolith from module 3 of the
#   Azure-Samples/modernize-monolith-workshop workshop.
#   (The original .NET Framework 4.8 version is Windows-only; this is
#    the post-upgrade, Linux-runnable monolith — still a single app,
#    still "legacy in a VM" for demo purposes.)
#
# cloud-init (cloudInitNoCloud.userData) drives first-boot provisioning:
#   1. Installs .NET 9 SDK via Microsoft's dotnet-install.sh
#   2. Clones the workshop repo (--depth 1 for speed)
#   3. Publishes the monolith to /opt/eshoplite
#   4. Installs + starts it as a systemd service on port 5000
# ------------------------------------------------------------
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: eshoplite-vm
  namespace: eshoplite-vm
  labels:
    app: eshoplite-vm
    app.kubernetes.io/part-of: aro-ossm-demo
    demo-step: step1-vm
spec:
  # Keep the VM running; ArgoCD will reconcile this to true on drift
  running: true

  # -------------------------------------------------------------------
  # DataVolumeTemplate: clones the RHEL 8 golden image from OCP Virt's
  # pre-pulled DataSource. CDI performs a local PVC clone — fast and
  # requires no external pull. The golden image in
  # openshift-virtualization-os-images is kept current by OCP Virt.
  # On cluster recreate: re-applying this manifest re-clones the image.
  # -------------------------------------------------------------------
  dataVolumeTemplates:
    - metadata:
        name: eshoplite-vm-rootdisk
      spec:
        storage:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 30Gi
        sourceRef:
          kind: DataSource
          name: rhel8
          namespace: openshift-virtualization-os-images

  template:
    metadata:
      labels:
        # These labels are inherited by the VirtualMachineInstance pod,
        # which is how the Service selector finds this VM.
        app: eshoplite-vm
        demo-step: step1-vm
    spec:
      domain:
        cpu:
          # 2 cores: enough to compile .NET on first boot without timing out
          cores: 2
        memory:
          # 4 GiB: .NET 9 SDK build + SQLite + Kestrel comfortably fit here
          guest: 4Gi
        devices:
          disks:
            # Primary OS disk cloned from the RHEL 8 golden image
            - name: rootdisk
              disk:
                bus: virtio
            # cloud-init drives first-boot provisioning
            - name: cloudinit
              disk:
                bus: virtio
          interfaces:
            # masquerade: VM gets a private IP, traffic NATted through the pod IP
            # This is the standard KubeVirt/OpenShift Virt networking mode
            # ports must be declared at interface level (sibling to masquerade)
            # so KubeVirt sets up iptables DNAT rules for inbound traffic
            - name: default
              masquerade: {}
              ports:
                - name: http
                  port: 5000
                  protocol: TCP

      networks:
        - name: default
          pod: {}   # use the pod network (same network as Kubernetes Services)

      volumes:
        # -----------------------------------------------------------
        # rootdisk: cloned from the RHEL 8 golden image DataSource.
        # CDI handles the clone locally — no external registry pull.
        # The DataVolumeTemplate below defines the PVC that backs this.
        # -----------------------------------------------------------
        - name: rootdisk
          dataVolume:
            name: eshoplite-vm-rootdisk

        # -----------------------------------------------------------
        # cloud-init: user-data stored in a Secret (size > 2048 bytes).
        # See cloudinit-secret.yaml.
        # -----------------------------------------------------------
        - name: cloudinit
          cloudInitNoCloud:
            secretRef:
              name: eshoplite-cloudinit
