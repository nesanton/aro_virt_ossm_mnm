# ------------------------------------------------------------
# cloud-init user-data for the eShopLite RHEL 8 VM.
#
# Stored as a Secret (not ConfigMap) because KubeVirt's
# cloudInitNoCloud.userDataSecretRef expects a Secret with
# a key named "userdata".
#
# The inline userData in vm.yaml exceeds KubeVirt's 2048-byte
# limit for inline data, so the content lives here instead.
# ------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: eshoplite-cloudinit
  namespace: eshoplite-vm
type: Opaque
stringData:
  userdata: |
    #cloud-config
    # NOTE: ssh_authorized_keys is injected at deploy time by bootstrap.sh
    # from ~/.ssh/aro-demo-vm.pub — not stored in git.
    ssh_authorized_keys: []

    packages:
      - curl
      - git
      - libicu
      - krb5-libs
      - openssl
      - tar

    write_files:
      - path: /etc/systemd/system/eshoplite.service
        owner: root:root
        permissions: '0644'
        content: |
          [Unit]
          Description=eShopLite Monolith (.NET 9 / ASP.NET Core)
          After=network.target

          [Service]
          WorkingDirectory=/opt/eshoplite
          ExecStart=/usr/bin/dotnet eShopLite.StoreCore.dll
          Environment=ASPNETCORE_URLS=http://0.0.0.0:5000
          Environment=ASPNETCORE_ENVIRONMENT=Production
          Environment=DOTNET_CLI_HOME=/tmp/dotnet-cli-home
          Environment=HOME=/root
          Environment=DOTNET_CLI_TELEMETRY_OPTOUT=1
          Restart=always
          RestartSec=10
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target

    runcmd:
      - set -o pipefail
      - |
        (
          set -xe
          LOG=/var/log/eshoplite-init.log
          echo "[$(date)] Starting eshoplite setup" | tee -a $LOG
          curl -sSL https://packages.microsoft.com/config/rhel/8/prod.repo \
            -o /etc/yum.repos.d/microsoft-prod.repo 2>&1 | tee -a $LOG
          dnf install -y dotnet-sdk-9.0 2>&1 | tee -a $LOG
          echo "[$(date)] dotnet installed" | tee -a $LOG
          git clone --depth 1 https://github.com/Azure-Samples/modernize-monolith-workshop.git /opt/workshop 2>&1 | tee -a $LOG
          dotnet publish /opt/workshop/3-modernize-with-github-copilot/StartSample/src/eShopLite.StoreCore \
            -c Release -o /opt/eshoplite 2>&1 | tee -a $LOG
          echo "[$(date)] app published" | tee -a $LOG
          systemctl daemon-reload
          systemctl enable eshoplite.service
          systemctl start eshoplite.service
          firewall-cmd --permanent --add-port=5000/tcp || true
          firewall-cmd --reload || true
          echo "[$(date)] Done" | tee -a $LOG
          echo "SUCCESS" > /var/log/eshoplite-init-done
        ) || echo "FAILED: $?" > /var/log/eshoplite-init-done
