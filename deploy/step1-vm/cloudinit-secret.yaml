# ------------------------------------------------------------
# cloud-init user-data for the eShopLite RHEL 8 VM.
#
# Stored as a Secret (not ConfigMap) because KubeVirt's
# cloudInitNoCloud.userDataSecretRef expects a Secret with
# a key named "userdata".
#
# The inline userData in vm.yaml exceeds KubeVirt's 2048-byte
# limit for inline data, so the content lives here instead.
# ------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: eshoplite-cloudinit
  namespace: eshoplite-vm
type: Opaque
stringData:
  userdata: |
    #cloud-config
    # NOTE: ssh_authorized_keys is injected at deploy time by bootstrap.sh
    # from ~/.ssh/aro-demo-vm.pub — not stored in git.
    ssh_authorized_keys: []

    # Console password for demo/debug — stored as SHA-512 hash (safe to commit).
    # Plaintext: redhat
    chpasswd:
      list:
        - cloud-user:$6$Eeh/Npz43/5PE74T$UcZDZfiyLYTR/KAFxRgKsuy1qJ2STPNFeKReV0LGImUMOmOPD9Qrb1IjnBZ7C3Xij8cyPwfbcteYLQjoWZigr.
      expire: false
    ssh_pwauth: false

    packages:
      - libicu
      - krb5-libs
      - openssl

    write_files:
      # CentOS Stream 8 public mirrors — provides git, tar, and other packages
      # without requiring an RHSM subscription (the RHEL 8 golden image has none).
      # CentOS Stream 8 is ABI-compatible with RHEL 8.
      - path: /etc/yum.repos.d/centos-stream8.repo
        owner: root:root
        permissions: '0644'
        content: |
          [cs8-baseos]
          name=CentOS Stream 8 - BaseOS
          baseurl=https://vault.centos.org/centos/8-stream/BaseOS/x86_64/os/
          gpgcheck=0
          enabled=1

          [cs8-appstream]
          name=CentOS Stream 8 - AppStream
          baseurl=https://vault.centos.org/centos/8-stream/AppStream/x86_64/os/
          gpgcheck=0
          enabled=1

      # Setup script written as a real bash script to avoid cloud-init's /bin/sh
      # POSIX-mode limitation (which breaks process substitution used for logging).
      - path: /usr/local/bin/eshoplite-setup.sh
        owner: root:root
        permissions: '0755'
        content: |
          #!/bin/bash
          set -xeo pipefail
          LOG=/var/log/eshoplite-init.log
          exec > >(tee -a "$LOG") 2>&1

          echo "[$(date)] Starting eshoplite setup"

          dnf install -y git tar curl
          echo "[$(date)] packages installed"

          curl -sSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
          bash /tmp/dotnet-install.sh --channel 9.0 --install-dir /usr/local/dotnet
          ln -sf /usr/local/dotnet/dotnet /usr/bin/dotnet
          dotnet --version
          echo "[$(date)] dotnet installed"

          git clone --depth 1 \
            https://github.com/Azure-Samples/modernize-monolith-workshop.git \
            /opt/workshop
          dotnet publish \
            /opt/workshop/3-modernize-with-github-copilot/StartSample/src/eShopLite.StoreCore \
            -c Release -o /opt/eshoplite
          echo "[$(date)] app published"

          systemctl daemon-reload
          systemctl enable eshoplite.service
          systemctl start eshoplite.service
          firewall-cmd --permanent --add-port=5000/tcp || true
          firewall-cmd --reload || true

          echo "[$(date)] Done"
          echo "SUCCESS" > /var/log/eshoplite-init-done

      - path: /etc/systemd/system/eshoplite.service
        owner: root:root
        permissions: '0644'
        content: |
          [Unit]
          Description=eShopLite Monolith (.NET 9 / ASP.NET Core)
          After=network.target

          [Service]
          WorkingDirectory=/opt/eshoplite
          ExecStart=/usr/bin/dotnet eShopLite.StoreCore.dll
          Environment=ASPNETCORE_URLS=http://0.0.0.0:5000
          Environment=ASPNETCORE_ENVIRONMENT=Production
          Environment=DOTNET_CLI_HOME=/tmp/dotnet-cli-home
          Environment=HOME=/root
          Environment=DOTNET_CLI_TELEMETRY_OPTOUT=1
          Restart=always
          RestartSec=10
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target

    runcmd:
      - bash /usr/local/bin/eshoplite-setup.sh || echo "FAILED: $?" > /var/log/eshoplite-init-done
