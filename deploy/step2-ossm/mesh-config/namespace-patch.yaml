# ------------------------------------------------------------
# Sidecar injection enrollment for the eshoplite-vm namespace.
#
# Sidecar injection uses the namespace label:
#   istio-injection: "enabled"
#
# Applying this via ArgoCD means:
#   toggle ON  → oc apply -f deploy/argocd/application-ossm-config.yaml
#   toggle OFF → oc delete -f deploy/argocd/application-ossm-config.yaml
#                (ArgoCD prune removes the label from the namespace)
#
# NOTE: Sidecar injection only affects new pods. After applying this label,
# the virt-launcher pod must be bounced (VM restart) to inject the sidecar.
#
# Istio CNI is required (see operators/istiocni.yaml) to avoid NET_ADMIN
# SCC conflict with virt-launcher on ARO. See decisions.md D-003.
# ------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: eshoplite-vm
  labels:
    app.kubernetes.io/part-of: aro-ossm-demo
    demo-step: step1-vm
    istio-injection: "enabled"
    istio-discovery: enabled
    istio.io/rev: default
