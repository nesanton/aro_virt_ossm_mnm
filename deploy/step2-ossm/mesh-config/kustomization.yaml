# ------------------------------------------------------------
# Kustomize entry point for deploy/step2-ossm/mesh-config/
#
# ArgoCD Application: step2-ossm-config (TOGGLEABLE)
#
# This application is the "before/after" toggle in the demo:
#   Sync   → adds istio-injection=enabled to eshoplite-vm namespace
#   Delete → ArgoCD prune removes the label (mesh enrollment revoked)
#
# Manual sync is intentional — do NOT enable automated sync on this app.
# The demo presenter controls it via ArgoCD UI or `oc apply/delete`.
# ------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace-patch.yaml              # Namespace label: istio-injection=enabled (sidecar injection)
  - gateway.yaml                      # Istio Gateway: eshoplite-gateway (HTTP/80, host *)
  - virtualservice.yaml               # Istio VirtualService: eshoplite → eshoplite svc:80
