apiVersion: sailoperator.io/v1
kind: Istio
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  version: v1.28-latest
  namespace: istio-system
  profile: default
  values:
    sidecarInjectorWebhook:
      # Never inject into OpenShift build pods (label added automatically by OCP).
      # Without this, the Envoy sidecar intercepts the builder's outbound TCP to
      # GitHub and to the Kube API server, causing S2I builds to fail in any
      # mesh-enrolled namespace.
      neverInjectSelector:
        - matchExpressions:
          - key: openshift.io/build.name
            operator: Exists
