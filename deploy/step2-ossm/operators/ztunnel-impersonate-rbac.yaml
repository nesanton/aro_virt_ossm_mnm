---
# Sail Operator on ARO generates a minimal ztunnel ClusterRole that only
# grants securitycontextconstraints/use. Missing permissions for ambient
# workload identity (SPIFFE cert signing):
#
#  1. serviceaccounts/token create — ztunnel calls TokenRequest for each
#     workload SA (e.g. eshoplite-vm/default) to obtain a token it sends
#     to istiod as proof of identity. Without this istiod responds with
#     "request impersonation authentication failure".
#
#  2. serviceaccounts impersonate — belt-and-suspenders for clusters that
#     use Kubernetes HTTP impersonation headers path.
#
# This is applied in wave 1 (after Sail Operator installs the ztunnel SA).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ztunnel-impersonate
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
rules:
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["impersonate"]
- apiGroups: [""]
  resources: ["pods", "nodes", "namespaces", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.istio.io", "security.istio.io", "telemetry.istio.io"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ztunnel-impersonate
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ztunnel-impersonate
subjects:
- kind: ServiceAccount
  name: ztunnel
  namespace: istio-system
